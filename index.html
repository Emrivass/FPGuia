<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explora FP × Ucademy · Pitch comercial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f1f3f0;
    --surface: #ffffff;
    --surface-2: #f6f7f4;
    --surface-3: #eaece7;
    --line: #e0e3dd;
    --line-soft: #ebede8;
    --ink: #18211c;
    --ink-soft: #586057;
    --ink-faint: #939c93;
    --brand: #16633f;
    --brand-deep: #0e4a2e;
    --accent: #18a06a;
    --accent-soft: #e4f3ea;
    --accent-strong: #0f6e49;
    --warm: #d98324;
    --warm-soft: #fbeede;
    --obj: #2563c4;       --obj-bg: #e8f0fd;
    --vis: #0f9268;       --vis-bg: #e3f4ee;
    --ext: #b06a0d;       --ext-bg: #fbf0dd;
    --danger: #d4493c;    --danger-bg: #fbe9e7;
    --r: 13px;
    --shadow: 0 1px 2px rgba(20,40,30,.04), 0 6px 22px rgba(20,40,30,.06);
    --shadow-sm: 0 1px 2px rgba(20,40,30,.06);
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --display: "Fraunces", Georgia, "Times New Roman", serif;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
  .app { min-height: 100vh; }

  /* Brand (in topbar) */
  .brand-logo { display: flex; align-items: center; gap: 11px; }
  .brand-mark { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(145deg, var(--brand) 0%, var(--brand-deep) 100%); color: #fff; display: grid; place-items: center; font-family: var(--display); font-weight: 600; font-size: 17px; letter-spacing: -.02em; flex-shrink: 0; box-shadow: 0 2px 8px rgba(14,74,46,.25); }
  .brand-name { font-family: var(--display); font-size: 18px; font-weight: 600; letter-spacing: -.01em; line-height: 1.1; }
  .brand-name span { color: var(--accent); font-style: italic; }
  .brand-tag { font-size: 11px; color: var(--ink-faint); letter-spacing: .04em; text-transform: uppercase; margin-top: 2px; }

  /* Main */
  .main { min-width: 0; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; gap: 14px; padding: 12px 28px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: rgba(241,243,240,.85); backdrop-filter: saturate(160%) blur(10px); z-index: 5; }
  .topbar-brand { flex-shrink: 0; margin-right: 4px; }
  .topbar-brand-text .brand-name { font-size: 15px; line-height: 1.05; }
  .topbar-brand-text .brand-tag { font-size: 9.5px; margin-top: 1px; }
  @media (max-width: 720px) { .topbar-brand-text { display: none; } }
  .area-strip { display: flex; gap: 7px; align-items: center; padding: 11px 28px; border-bottom: 1px solid var(--line-soft); background: var(--surface); overflow-x: auto; position: sticky; top: 57px; z-index: 4; }
  .area-strip::-webkit-scrollbar { height: 0; }
  .area-chip { flex-shrink: 0; display: flex; align-items: center; gap: 8px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 99px; padding: 7px 14px 7px 9px; cursor: pointer; transition: all .15s; font: inherit; }
  .area-chip:hover { border-color: var(--accent); }
  .area-chip.active { background: linear-gradient(150deg, var(--brand) 0%, var(--brand-deep) 100%); border-color: var(--brand-deep); box-shadow: 0 3px 10px rgba(14,74,46,.2); }
  .area-chip.active .ac-num { background: rgba(255,255,255,.22); color: #fff; }
  .area-chip.active .ac-name { color: #fff; }
  .ac-num { width: 22px; height: 22px; border-radius: 50%; background: var(--surface-3); color: var(--ink-soft); display: grid; place-items: center; font-family: var(--display); font-size: 12px; font-style: italic; font-weight: 600; flex-shrink: 0; }
  .area-chip.done .ac-num { background: var(--accent-soft); color: var(--accent-strong); }
  .ac-name { font-size: 13.5px; font-weight: 600; color: var(--ink); white-space: nowrap; }
  .ac-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); flex-shrink: 0; }
  .area-chip.done .ac-dot, .area-chip.active .ac-dot { background: var(--accent); }
  .area-chip.active .ac-dot { background: #fff; }
  .ac-add { flex-shrink: 0; background: transparent; border: 1px dashed var(--line); color: var(--ink-faint); border-radius: 99px; padding: 7px 14px; cursor: pointer; font: inherit; font-size: 13px; font-weight: 600; transition: all .15s; }
  .ac-add:hover { border-color: var(--accent); color: var(--accent); }
  .crumb { font-size: 12px; color: var(--ink-faint); font-weight: 500; }
  .crumb b { color: var(--ink-soft); font-weight: 700; }
  .topbar .spacer { flex: 1; }
  .pager { display: flex; gap: 5px; }
  .pager button { width: 32px; height: 32px; padding: 0; display: grid; place-items: center; background: var(--surface); border: 1px solid var(--line); color: var(--ink-soft); border-radius: 8px; cursor: pointer; transition: all .12s; }
  .pager button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .pager button:disabled { opacity: .4; cursor: default; }
  .pager svg { width: 15px; height: 15px; }
  .save-state { font-size: 12px; color: var(--ink-faint); display: flex; align-items: center; gap: 6px; font-weight: 500; }
  .save-state .pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .35; transition: opacity .3s; }
  .save-state.dirty .pip { opacity: 1; }
  .btn { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--ink); background: var(--surface); border: 1px solid var(--line); border-radius: 9px; padding: 8px 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: all .12s; box-shadow: var(--shadow-sm); }
  .btn:hover { border-color: var(--ink-faint); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
  .btn.ghost { background: transparent; box-shadow: none; border-color: transparent; }
  .btn.ghost:hover { background: var(--surface-2); border-color: var(--line); }
  .btn svg { width: 15px; height: 15px; }
  .icon-btn { background: transparent; border: 0; color: var(--ink-faint); cursor: pointer; padding: 6px; border-radius: 7px; display: inline-flex; transition: all .12s; }
  .icon-btn:hover { color: var(--danger); background: var(--danger-bg); }
  .icon-btn svg { width: 16px; height: 16px; }

  .editor { padding: 30px 36px 80px; max-width: 920px; width: 100%; margin: 0 auto; }
  .area-head { margin-bottom: 18px; }
  .area-title-row { display: flex; align-items: center; gap: 12px; }
  .area-title-input { flex: 1; background: transparent; border: 0; color: var(--ink); font-family: var(--display); font-size: 30px; font-weight: 600; letter-spacing: -.02em; padding: 3px 0; outline: none; border-bottom: 2px solid transparent; }
  .area-title-input:hover { border-bottom-color: var(--line); }
  .area-title-input:focus { border-bottom-color: var(--accent); }
  .area-sub { margin: 6px 0 0; font-size: 13px; color: var(--ink-faint); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .expand-toggle { background: transparent; border: 0; color: var(--accent); font-family: var(--sans); font-size: 12.5px; font-weight: 600; cursor: pointer; padding: 0; }
  .expand-toggle:hover { text-decoration: underline; }

  /* Subareas */
  .subarea { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow .15s; }
  .subarea.open { box-shadow: var(--shadow); }
  .sa-head { display: flex; align-items: center; gap: 11px; padding: 15px 17px; cursor: pointer; user-select: none; }
  .sa-head:hover { background: var(--surface-2); }
  .sa-chevron { color: var(--ink-faint); transition: transform .2s; flex-shrink: 0; display: inline-flex; }
  .subarea.open .sa-chevron { transform: rotate(90deg); color: var(--accent); }
  .sa-chevron svg { width: 17px; height: 17px; }
  .sa-name-input { flex: 1; background: transparent; border: 0; color: var(--ink); font-family: var(--sans); font-size: 16px; font-weight: 700; letter-spacing: -.01em; outline: none; padding: 4px 8px; border-radius: 7px; transition: background .12s; }
  .sa-name-input:hover { background: var(--surface-3); }
  .sa-name-input:focus { background: var(--surface-3); box-shadow: inset 0 0 0 1px var(--accent); }
  .sa-count { font-size: 11px; font-weight: 600; color: var(--ink-soft); background: var(--surface-3); padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
  .sa-body { padding: 6px 18px 20px; border-top: 1px solid var(--line-soft); display: none; }
  .subarea.open .sa-body { display: block; }

  .label-row { display: flex; align-items: center; gap: 9px; margin: 18px 0 8px; }
  .chip { font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; padding: 4px 10px; border-radius: 7px; white-space: nowrap; }
  .chip.obj { color: var(--obj); background: var(--obj-bg); }
  .chip.vis { color: var(--vis); background: var(--vis-bg); }
  .chip.ext { color: var(--ext); background: var(--ext-bg); }
  .label-desc { font-size: 12px; color: var(--ink-faint); }

  textarea, .txt-input { width: 100%; background: var(--surface); border: 1px solid var(--line); border-radius: 9px; color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.55; padding: 11px 13px; resize: none; outline: none; transition: border-color .15s, box-shadow .15s; }
  textarea { overflow: hidden; }
  textarea:focus, .txt-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  textarea::placeholder, .txt-input::placeholder { color: var(--ink-faint); }
  .obj-area { min-height: 52px; background: var(--surface-2); }

  .visions { margin-top: 6px; }
  .vision { background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; padding: 13px; margin-bottom: 11px; transition: border-color .12s; }
  .vision:hover { border-color: var(--line-soft); }
  .vision-top { display: flex; align-items: flex-start; gap: 9px; }
  .role-box { background: var(--obj-bg); border-radius: 9px; padding: 9px 12px; display: flex; align-items: flex-start; gap: 10px; }
  .role-area { margin-top: 12px; }
  .role-sub { margin: 2px 0 4px; }
  .role-label { flex-shrink: 0; font-size: 10.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--obj); padding-top: 8px; white-space: nowrap; }
  .role-text { font-size: 13px; min-height: 32px; padding: 6px 9px; background: var(--surface); border-color: transparent; }
  .role-text:focus { border-color: var(--obj); box-shadow: 0 0 0 2px var(--obj-bg); }
  .v-goal { flex-shrink: 0; width: 210px; background: var(--obj-bg); border-radius: 8px; padding: 7px 9px; }
  .v-goal-label { display: block; font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--obj); margin-bottom: 3px; }
  .v-goal .v-goal-text { font-size: 12.5px; min-height: 30px; padding: 6px 8px; background: var(--surface); border-color: transparent; }
  .v-goal .v-goal-text:focus { border-color: var(--obj); box-shadow: 0 0 0 2px var(--obj-bg); }
  @media (max-width: 700px) { .vision-top { flex-wrap: wrap; } .v-goal { width: 100%; } .role-box { flex-direction: column; gap: 4px; } .role-label { padding-top: 0; } }

  /* ===== Copiloto de llamada (modo guiado) ===== */
  .cop { display: grid; grid-template-columns: minmax(0,1fr) 320px; gap: 22px; align-items: start; padding: 24px 36px 70px; max-width: 1200px; width: 100%; margin: 0 auto; }
  .cop-simple { display: block; max-width: 680px; padding: 16px 18px 80px; }
  .simplebar { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; margin-bottom: 14px; box-shadow: var(--shadow-sm); position: sticky; top: 8px; z-index: 6; }
  .sb-item { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .sb-k { font-size: 9.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-faint); }
  .sb-v { font-size: 14px; font-weight: 800; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-temp { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .sb-deg { font-family: var(--display); font-size: 24px; font-weight: 600; line-height: 1; }
  .sb-bar { width: 56px; height: 8px; border-radius: 99px; background: var(--surface-3); overflow: hidden; }
  .sb-fill { display: block; height: 100%; border-radius: 99px; transition: width .4s ease; }
  @media (max-width: 560px) {
    .cop-simple { padding: 12px 12px 80px; }
    .simplebar { gap: 9px; padding: 9px 11px; }
    .sb-v { font-size: 12.5px; }
    .sb-deg { font-size: 20px; }
    .sb-bar { width: 40px; }
  }
  .cop-main { min-width: 0; }
  .cop-side { position: sticky; top: 76px; display: flex; flex-direction: column; gap: 12px; min-width: 0; }
  .cop-intro { margin-bottom: 14px; }
  .cop-intro h2 { font-family: var(--display); font-size: 26px; font-weight: 600; letter-spacing: -.015em; margin: 0 0 3px; }
  .cop-intro p { margin: 0; color: var(--ink-soft); font-size: 13px; line-height: 1.45; }
  .cop-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
  .cop-step { text-align: left; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 9px 13px; cursor: pointer; transition: all .18s; position: relative; }
  .cop-step:hover { border-color: var(--accent); transform: translateY(-1px); }
  .cop-step.on { background: linear-gradient(150deg, var(--brand) 0%, var(--brand-deep) 100%); border-color: var(--brand-deep); box-shadow: 0 4px 14px rgba(14,74,46,.22); }
  .cop-step.on .cs-n { color: rgba(255,255,255,.65); }
  .cop-step.on .cs-t { color: #fff; }
  .cop-step.done { border-color: var(--accent); background: var(--accent-soft); }
  .cs-n { font-family: var(--display); font-size: 13px; font-weight: 600; font-style: italic; color: var(--ink-faint); }
  .cop-step.done .cs-n { color: var(--accent-strong); }
  .cs-t { font-size: 13px; font-weight: 700; margin-top: 1px; color: var(--ink); line-height: 1.2; }
  .cop-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 20px 22px; box-shadow: var(--shadow); }
  .cop-card h3 { font-family: var(--display); font-size: 21px; font-weight: 600; margin: 0 0 3px; letter-spacing: -.01em; }
  .cop-card .lead { color: var(--ink-soft); font-size: 13.5px; margin: 0 0 16px; line-height: 1.45; }
  .cop-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent-strong); margin-bottom: 6px; }
  .cop-eyebrow .eb-num { font-family: var(--display); font-style: italic; font-size: 13px; letter-spacing: 0; }
  .cop-block { margin-bottom: 16px; }
  .cop-block:last-child { margin-bottom: 0; }
  .cop-block-h { font-size: 11.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 8px; }
  .say { background: var(--vis-bg); border-left: 3px solid var(--vis); border-radius: 8px; padding: 9px 13px; font-size: 14.5px; margin-bottom: 7px; line-height: 1.45; }
  .say .say-k { display: block; font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--vis); margin-bottom: 2px; }
  .sig { display: flex; align-items: flex-start; gap: 10px; width: 100%; text-align: left; background: var(--surface-2); border: 1.5px solid var(--line); border-radius: 9px; padding: 10px 13px; cursor: pointer; transition: all .14s; margin-bottom: 7px; }
  .sig:hover { border-color: var(--ink-faint); }
  .sig.on { background: var(--accent-soft); border-color: var(--accent); }
  .sig-check { flex-shrink: 0; width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--ink-faint); display: grid; place-items: center; margin-top: 1px; transition: all .14s; }
  .sig.on .sig-check { background: var(--accent); border-color: var(--accent); }  .sig-check svg { width: 12px; height: 12px; stroke: #fff; stroke-width: 3.5; opacity: 0; transition: opacity .14s; }
  .sig.on .sig-check svg { opacity: 1; }
  .sig-body { flex: 1; }
  .sig-t { font-size: 14.5px; font-weight: 600; line-height: 1.35; }
  .sig-tag { display: inline-block; font-size: 10.5px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; padding: 2px 7px; border-radius: 5px; margin-top: 6px; }
  .followup { margin: -2px 0 9px 30px; background: var(--accent-soft); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 9px 13px; font-size: 14px; line-height: 1.45; color: var(--ink); }  .followup .fu-k { display: block; font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--accent-strong); margin-bottom: 2px; }
  .cl-tabs { display: flex; gap: 6px; margin-bottom: 16px; background: var(--surface-2); padding: 4px; border-radius: 10px; }
  .cl-tab { flex: 1; padding: 9px 12px; border: 0; background: none; border-radius: 7px; font-size: 14px; font-weight: 700; color: var(--ink-soft); cursor: pointer; transition: all .15s; }
  .cl-tab:hover { color: var(--ink); }
  .cl-tab.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }
  .tag-seguridad { background: var(--obj-bg); color: var(--obj); }
  .tag-ego { background: var(--ext-bg); color: var(--ext); }
  .tag-social { background: var(--vis-bg); color: var(--vis); }
  .tag-insercion { background: #e7eefc; color: #2456c0; }
  .tag-autonomia { background: #ede7fb; color: #6b3fc0; }
  .tag-accesibilidad { background: #fdeede; color: #b5750d; }
  .cop-nav { display: flex; gap: 10px; margin-top: 22px; }
  .cop-btn { flex: 1; padding: 13px; border-radius: 10px; border: 1px solid var(--line); background: var(--surface); font-size: 15px; font-weight: 700; cursor: pointer; transition: all .15s; color: var(--ink); }
  .cop-btn:hover { border-color: var(--ink-faint); }
  .cop-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .cop-btn.primary:hover { background: var(--accent-strong); }
  .cop-btn:disabled { opacity: .45; cursor: not-allowed; }
  .w { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 14px 15px; box-shadow: var(--shadow-sm); }
  .w-h { font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 10px; }
  .thermo-deg { font-family: var(--display); font-size: 38px; font-weight: 600; line-height: 1; letter-spacing: -.02em; }
  .thermo-deg sup { font-size: 17px; font-weight: 600; vertical-align: super; }
  .thermo-lbl { font-size: 12px; font-weight: 600; color: var(--ink-soft); margin: 4px 0 12px; line-height: 1.3; }
  .thermo-track { height: 11px; border-radius: 99px; background: linear-gradient(90deg, #3b82f6 0%, #36b37e 35%, #f5b301 65%, #e3493c 100%); position: relative; box-shadow: inset 0 1px 2px rgba(0,0,0,.08); }
  .thermo-knob { position: absolute; top: 50%; width: 20px; height: 20px; border-radius: 50%; background: #fff; border: 3px solid var(--ink); transform: translate(-50%,-50%); transition: left .45s cubic-bezier(.34,1.4,.5,1); box-shadow: 0 2px 6px rgba(0,0,0,.2); }
  .thermo-scale { display: flex; justify-content: space-between; font-size: 10px; color: var(--ink-faint); margin-top: 8px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; }
  .meter { margin-bottom: 9px; }
  .meter:last-child { margin-bottom: 0; }
  .meter-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
  .meter-name { font-size: 13px; font-weight: 700; }
  .meter-pct { font-size: 11.5px; color: var(--ink-faint); font-weight: 600; }
  .meter-track { height: 7px; border-radius: 99px; background: var(--surface-3); overflow: hidden; }
  .meter-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
  .lead-result { font-size: 13px; color: var(--ink-soft); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line-soft); }
  .lead-result b { color: var(--ink); }
  .pill-lead { display: inline-block; font-size: 12px; font-weight: 800; padding: 3px 10px; border-radius: 99px; margin: 2px 4px 2px 0; }
  .nba { background: linear-gradient(155deg, #1c2b22 0%, #11201a 100%); color: #fff; border: 0; }
  .nba .w-h { color: rgba(255,255,255,.5); }
  .nba-text { font-size: 14.5px; line-height: 1.5; font-weight: 500; }
  .nba-text b { color: #6fe0ad; font-weight: 700; }
  .empty-side { color: var(--ink-faint); font-size: 13px; font-style: italic; }
  .strongpoint { background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }

let saveTimer;

function load() {
  let data;
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) { const d = JSON.parse(raw); if (Array.isArray(d) && d.length) data = d; } } catch (e) {}
  if (!data) data = JSON.parse(JSON.stringify(seed));
  data.forEach(a => {
    if (a.role === undefined) a.role = "";
    a.subs && a.subs.forEach(s => {
    if (!Array.isArray(s.extras)) s.extras = [];
    const fix = e => {
      if (!Array.isArray(e.examples)) {
        e.examples = [];
        if (e.example && e.example.trim()) e.examples.push(mkEx(e.example));
        delete e.example;
      }
      e.examples.forEach(x => { if (!x.id) x.id = uid(); });
    };
    s.extras.forEach(fix);
    (s.visions || []).forEach(v => { if (v.goal === undefined) v.goal = ""; (v.extras || []).forEach(fix); });
    });
  });
  return data;
}
function persist() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(model)); } catch (e) {} }

const $ = id => document.getElementById(id);
const editor = $("editor"), crumb = $("crumb");
const saveState = $("saveState"), saveText = $("saveText");

function areaHasContent(a) { const exHas = e => e.text.trim() || (e.examples||[]).some(x => x.text.trim()); return a.subs.some(s => s.objDesc.trim() || (s.extras || []).some(exHas) || s.visions.some(v => v.text.trim() || v.extras.some(exHas))); }

function scheduleSave() {
  saveState.classList.add("dirty"); saveText.textContent = "Guardando…";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { persist(); saveState.classList.remove("dirty"); saveText.textContent = "Guardado"; updateProgress(); }, 450);
}

function updateProgress() {
  // refleja el estado "con contenido" en los chips de áreas
  document.querySelectorAll(".area-chip").forEach((b, i) => {
    if (model[i]) b.classList.toggle("done", areaHasContent(model[i]));
  });
}

function renderNav() {
  const strip = $("areaStrip");
  strip.innerHTML = "";
  model.forEach((area, i) => {
    const btn = document.createElement("button");
    btn.className = "area-chip" + (i === ai ? " active" : "") + (areaHasContent(area) ? " done" : "");
    btn.innerHTML = `<span class="ac-num">${i+1}</span><span class="ac-name"></span><span class="ac-dot"></span>`;
    btn.querySelector(".ac-name").textContent = area.name;
    btn.onclick = () => { ai = i; renderNav(); renderEditor(); };
    strip.appendChild(btn);
  });
  const add = document.createElement("button");
  add.className = "ac-add"; add.textContent = "+ Añadir área";
  add.onclick = () => { model.push(mkArea("Nueva área", [mkSub("Subárea", "", [mkVision("")])])); ai = model.length - 1; persist(); renderNav(); renderEditor(); updateProgress(); };
  strip.appendChild(add);
}

  $("prevArea").disabled = ai === 0;
  $("nextArea").disabled = ai === model.length - 1;

  const head = document.createElement("div");
  head.className = "area-head";
  const titleRow = document.createElement("div");
  titleRow.className = "area-title-row";
  titleRow.innerHTML = `<input class="area-title-input">`;
  const titleInput = titleRow.querySelector("input");
  titleInput.value = area.name;
  titleInput.oninput = () => { area.name = titleInput.value; scheduleSave(); const n = document.querySelectorAll(".area-chip .ac-name")[ai]; if (n) n.textContent = titleInput.value; };
  if (model.length > 1) {
    const del = document.createElement("button");
    del.className = "icon-btn"; del.title = "Eliminar área"; del.innerHTML = trash;
    del.onclick = () => { if (!confirm(`¿Eliminar el área "${area.name}" y todo su contenido?`)) return; model.splice(ai, 1); ai = Math.max(0, ai - 1); persist(); renderNav(); renderEditor(); updateProgress(); };
    titleRow.appendChild(del);
  }
  head.appendChild(titleRow);

  const roleRow = document.createElement("div");
  roleRow.className = "role-box role-area";
  roleRow.innerHTML = `<span class="role-label">¿Qué hace?</span>`;
  const roleTa = document.createElement("textarea");
  roleTa.className = "role-text"; roleTa.placeholder = "Para qué sirve esta área en la llamada..."; roleTa.value = area.role || "";
  roleTa.oninput = () => { area.role = roleTa.value; autosize(roleTa); scheduleSave(); };
  roleRow.appendChild(roleTa);
  head.appendChild(roleRow);

  const sub = document.createElement("p");
  sub.className = "area-sub";
  const count = area.subs.length;
  const subText = document.createElement("span");
  subText.textContent = `${count} subárea${count === 1 ? "" : "s"} · pulsa una para abrir y editar`;
  sub.appendChild(subText);
  if (count > 1) {
    const toggle = document.createElement("button");
    toggle.className = "expand-toggle";
    const expanded = openSub[area.id] === "__ALL__";
    toggle.textContent = expanded ? "Contraer todo" : "Expandir todo";
    toggle.onclick = () => { openSub[area.id] = expanded ? area.subs[0].id : "__ALL__"; renderEditor(); };
    sub.appendChild(toggle);
  }
  head.appendChild(sub);
  editor.appendChild(head);

  area.subs.forEach(sa => editor.appendChild(renderSub(area, sa)));

  const addSa = document.createElement("button");
  addSa.className = "add-sa"; addSa.textContent = "+ Añadir subárea";
  addSa.onclick = () => { const ns = mkSub("Nueva subárea", "", [mkVision("")]); area.subs.push(ns); openSub[area.id] = ns.id; persist(); renderEditor(); updateProgress(); };
  editor.appendChild(addSa);
}

function renderSub(area, sa) {
  if (openSub[area.id] === undefined && area.subs[0]) openSub[area.id] = area.subs[0].id;
  const isOpen = openSub[area.id] === "__ALL__" || openSub[area.id] === sa.id;
  const box = document.createElement("div");
  box.className = "subarea" + (isOpen ? " open" : "");

  const head = document.createElement("div");
  head.className = "sa-head";
  const vc = sa.visions.length;
  head.innerHTML = `${chev}<input class="sa-name-input"><span class="sa-count">${vc} visión${vc===1?"":"es"}</span>`;
  const nameInput = head.querySelector(".sa-name-input");
  nameInput.value = sa.name;
  nameInput.onclick = e => e.stopPropagation();
  nameInput.oninput = () => { sa.name = nameInput.value; scheduleSave(); };
  head.onclick = () => { openSub[area.id] = isOpen ? null : sa.id; renderEditor(); };
  if (area.subs.length > 1) {
    const del = document.createElement("button");
    del.className = "icon-btn"; del.title = "Eliminar subárea"; del.innerHTML = trash;
    del.onclick = e => { e.stopPropagation(); if (!confirm(`¿Eliminar la subárea "${sa.name}"?`)) return; area.subs = area.subs.filter(x => x.id !== sa.id); persist(); renderEditor(); updateProgress(); };
    head.appendChild(del);
  }
  box.appendChild(head);

  const body = document.createElement("div");
  body.className = "sa-body";

  const roleRow = document.createElement("div");
  roleRow.className = "role-box role-sub";
  roleRow.innerHTML = `<span class="role-label">¿Qué hace?</span>`;
  const roleTa = document.createElement("textarea");
  roleTa.className = "role-text"; roleTa.placeholder = "Para qué sirve esta subárea..."; roleTa.value = sa.objDesc;
  roleTa.oninput = () => { sa.objDesc = roleTa.value; autosize(roleTa); scheduleSave(); };
  roleRow.appendChild(roleTa);
  body.appendChild(roleRow);

  body.insertAdjacentHTML("beforeend", `<div class="label-row"><span class="chip vis">${visLabel(area)}</span><span class="label-desc">${visDesc(area)}</span></div>`);
  const visWrap = document.createElement("div"); visWrap.className = "visions";
  sa.visions.forEach((v, vi) => visWrap.appendChild(renderVision(sa, v, vi, area)));
  body.appendChild(visWrap);

  const addV = document.createElement("button");
  addV.className = "add-mini vis-add"; addV.textContent = "+ Añadir visión";
  addV.onclick = () => { sa.visions.push(mkVision("")); persist(); renderEditor(); updateProgress(); };
  body.appendChild(addV);

  // Subarea-level extras (independent of any vision, shown at the bottom)
  body.insertAdjacentHTML("beforeend", `<div class="label-row" style="margin-top:22px;"><span class="chip ext">Extras del objetivo</span><span class="label-desc">Apuntes o ejemplos generales · no van ligados a una visión</span></div>`);
  const saExtras = document.createElement("div"); saExtras.className = "extras"; saExtras.style.margin = "0";
  if (!Array.isArray(sa.extras)) sa.extras = [];
  sa.extras.forEach(e => {
    const row = document.createElement("div"); row.className = "extra-row";
    row.innerHTML = `<span class="chip ext" style="padding:2px 7px;">Extra</span>`;
    const inp = document.createElement("input");
    inp.className = "txt-input"; inp.placeholder = "Apunte o ejemplo general..."; inp.value = e.text;
    inp.oninput = () => { e.text = inp.value; scheduleSave(); };
    row.appendChild(inp);
    const del = document.createElement("button");
    del.className = "icon-btn"; del.title = "Eliminar extra"; del.innerHTML = trash;
    del.onclick = () => { sa.extras = sa.extras.filter(x => x.id !== e.id); persist(); renderEditor(); updateProgress(); };
    row.appendChild(del);
    saExtras.appendChild(row);
  });
  const addSaE = document.createElement("button");
  addSaE.className = "add-mini"; addSaE.textContent = "+ Añadir extra al objetivo";
  addSaE.onclick = () => { sa.extras.push(mkExtra("")); persist(); renderEditor(); updateProgress(); };
  saExtras.appendChild(addSaE);
  body.appendChild(saExtras);

  box.appendChild(body);
  return box;
}

function visLabel(area) { return /prospecci/i.test(area.name) ? "Preguntas" : "Visión"; }
function visDesc(area) { return /prospecci/i.test(area.name) ? "Cada pregunta con qué buscas y sus apuntes" : "Cada punto con qué hace y sus propuestas"; }

function renderVision(sa, v, vi, area) {
  const wrap = document.createElement("div"); wrap.className = "vision";
  const top = document.createElement("div"); top.className = "vision-top";
  top.innerHTML = `<span class="v-num">${vi+1}</span>`;
  const ta = document.createElement("textarea");
  ta.placeholder = "Escribe esta visión (una frase o varias)..."; ta.value = v.text;
  ta.oninput = () => { v.text = ta.value; autosize(ta); scheduleSave(); };
  top.appendChild(ta);
  const goalWrap = document.createElement("div"); goalWrap.className = "v-goal";
  goalWrap.innerHTML = `<span class="v-goal-label">¿Qué hace?</span>`;
  const goalTa = document.createElement("textarea");
  goalTa.className = "v-goal-text"; goalTa.placeholder = "Para qué sirve este punto..."; goalTa.value = v.goal || "";
  goalTa.oninput = () => { v.goal = goalTa.value; autosize(goalTa); scheduleSave(); };
  goalWrap.appendChild(goalTa);
  top.appendChild(goalWrap);
  if (sa.visions.length > 1) {
    const del = document.createElement("button");
    del.className = "icon-btn"; del.title = "Eliminar visión"; del.innerHTML = trash;
    del.onclick = () => { sa.visions = sa.visions.filter(x => x.id !== v.id); persist(); renderEditor(); updateProgress(); };
    top.appendChild(del);
  }
  wrap.appendChild(top);

  const ex = document.createElement("div"); ex.className = "extras";
  v.extras.forEach(e => {
    const card = document.createElement("div"); card.className = "extra-card";
    const head = document.createElement("div"); head.className = "extra-card-head";
    head.innerHTML = `<span class="chip ext" style="padding:2px 7px;">Propuesta</span>`;
    const del = document.createElement("button");
    del.className = "icon-btn"; del.title = "Eliminar propuesta"; del.innerHTML = trash;
    del.onclick = () => { v.extras = v.extras.filter(x => x.id !== e.id); persist(); renderEditor(); };
    head.appendChild(del);
    card.appendChild(head);

    const descTa = document.createElement("textarea");
    descTa.className = "ec-desc"; descTa.placeholder = "Nombre de la propuesta (ej. Online, Becas educativas)..."; descTa.value = e.text;
    descTa.oninput = () => { e.text = descTa.value; autosize(descTa); scheduleSave(); };
    card.appendChild(descTa);

    if (!Array.isArray(e.examples)) e.examples = [];
    const exList = document.createElement("div"); exList.className = "ec-examples";
    e.examples.forEach((ej, ei) => {
      const row = document.createElement("div"); row.className = "ec-ex-row";
      row.innerHTML = `<span class="ec-ex-num">${ei + 1}</span>`;
      const ejTa = document.createElement("textarea");
      ejTa.className = "ec-ex-text"; ejTa.placeholder = "Ejemplo de frase a decir..."; ejTa.value = ej.text;
      ejTa.oninput = () => { ej.text = ejTa.value; autosize(ejTa); scheduleSave(); };
      row.appendChild(ejTa);
      const ejDel = document.createElement("button");
      ejDel.className = "icon-btn"; ejDel.title = "Eliminar ejemplo"; ejDel.innerHTML = trash;
      ejDel.onclick = () => { e.examples = e.examples.filter(x => x.id !== ej.id); persist(); renderEditor(); };
      row.appendChild(ejDel);
      exList.appendChild(row);
    });
    const addEj = document.createElement("button");
    addEj.className = "add-mini"; addEj.style.fontSize = "12px"; addEj.textContent = "+ Añadir ejemplo";
    addEj.onclick = () => { e.examples.push(mkEx("")); persist(); renderEditor(); };
    exList.appendChild(addEj);
    card.appendChild(exList);

    ex.appendChild(card);
  });
  const addE = document.createElement("button");
  addE.className = "add-mini"; addE.textContent = "+ Añadir propuesta";
  addE.onclick = () => { v.extras.push(mkExtra("")); persist(); renderEditor(); };
  ex.appendChild(addE);
  wrap.appendChild(ex);
  return wrap;
}

$("exportBtn").onclick = () => {
  let txt = "PITCH COMERCIAL\nGenerado: " + new Date().toLocaleString("es-ES") + "\n\n";
  model.forEach((area, i) => {
    txt += "=".repeat(56) + "\n" + (i+1) + ". " + area.name.toUpperCase() + "\n" + "=".repeat(56) + "\n\n";
    area.subs.forEach(sa => {
      txt += "▸ " + sa.name + "\n";
      if (sa.objDesc.trim()) txt += "  Objetivo: " + sa.objDesc + "\n";
      sa.visions.forEach((v, vi) => {
        txt += "  " + (vi+1) + ". " + (v.text || "(vacío)") + "\n";
        v.extras.forEach(e => {
          if (e.text.trim()) txt += "       · " + e.text + "\n";
          (e.examples||[]).forEach(x => { if (x.text.trim()) txt += "           Ej: " + x.text + "\n"; });
        });
      });
      if ((sa.extras || []).some(e => e.text.trim())) {
        txt += "  Extras del objetivo:\n";
        sa.extras.forEach(e => { if (e.text.trim()) txt += "       · " + e.text + "\n"; });
      }
      txt += "\n";
    });
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([txt], { type: "text/plain;charset=utf-8" }));
  a.download = "pitch-comercial.txt"; a.click();
  toast("Pitch exportado");
};

$("exportXlsxBtn").onclick = () => {
  if (typeof XLSX === "undefined") { toast("No se pudo cargar el exportador de Excel"); return; }
  const headers = ["Área", "Campos", "Visión", "Extras"];
  const rows = [headers];
  const merges = [];
  const isProsp = a => /prospecci/i.test(a.name);

  model.forEach(area => {
    const areaStart = rows.length;
    let areaRowCount = 0;

    area.subs.forEach(sa => {
      const subStart = rows.length;
      let subRowCount = 0;

      // build the "Extras" cell text for a vision (proposals + examples) or prospección notes
      const visionRow = (v) => {
        let visText = v.text || "";
        if (isProsp(area) && (v.goal || "").trim()) visText += "\n[¿Qué buscamos?: " + v.goal.trim() + "]";
        const parts = [];
        v.extras.forEach(e => {
          let block = e.text || "";
          (e.examples || []).forEach(x => { if (x.text.trim()) block += (block ? "\n" : "") + "· " + x.text; });
          if (block.trim()) parts.push(block);
        });
        return [visText, parts.join("\n\n")];
      };

      if (sa.visions.length === 0) {
        rows.push(["", "", "", ""]); subRowCount = 1;
      } else {
        sa.visions.forEach(v => {
          const [visText, extrasText] = visionRow(v);
          rows.push(["", "", visText, extrasText]);
          subRowCount++;
        });
      }
      // subarea-level extras (Extras del objetivo) as an extra row
      const saExtras = (sa.extras || []).filter(e => e.text.trim());
      if (saExtras.length) {
        rows.push(["", "", "Extras del objetivo", saExtras.map(e => "· " + e.text).join("\n")]);
        subRowCount++;
      }
      // objective goes into a note row under the subarea name? Keep objetivo in the Campos cell tooltip-like: prepend
      // Merge "Campos" (subárea name + objetivo) vertically across its rows
      const subName = sa.name + (sa.objDesc.trim() ? "\n\n" + sa.objDesc.trim() : "");
      rows[subStart][1] = subName;
      if (subRowCount > 1) merges.push({ s: { r: subStart, c: 1 }, e: { r: subStart + subRowCount - 1, c: 1 } });

      areaRowCount += subRowCount;
    });

    if (areaRowCount === 0) { rows.push([area.name, "", "", ""]); areaRowCount = 1; }
    rows[areaStart][0] = area.name;
    if (areaRowCount > 1) merges.push({ s: { r: areaStart, c: 0 }, e: { r: areaStart + areaRowCount - 1, c: 0 } });
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"] = [{ wch: 22 }, { wch: 30 }, { wch: 55 }, { wch: 60 }];
  ws["!merges"] = merges;
  // wrap text + valign top + bold header
  const range = XLSX.utils.decode_range(ws["!ref"]);
  for (let R = range.s.r; R <= range.e.r; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const cell = ws[XLSX.utils.encode_cell({ r: R, c: C })];
      if (!cell) continue;
      cell.s = { alignment: { wrapText: true, vertical: "top" } };
      if (R === 0) cell.s = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "1F7A5A" } }, alignment: { vertical: "center", horizontal: "left" } };
    }
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Pitch");
  XLSX.writeFile(wb, "pitch-comercial.xlsx");
  toast("Excel exportado");
};

function goToArea(i) {
  if (i < 0 || i >= model.length || i === ai) return;
  ai = i; renderNav(); renderEditor();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
$("prevArea").onclick = () => goToArea(ai - 1);
$("nextArea").onclick = () => goToArea(ai + 1);

document.addEventListener("keydown", e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const tag = (e.target.tagName || "").toLowerCase();
  if (tag === "textarea" || tag === "input") return;
  if (e.key === "ArrowLeft") { e.preventDefault(); goToArea(ai - 1); }
  else if (e.key === "ArrowRight") { e.preventDefault(); goToArea(ai + 1); }
});

let gPhase = 0;            // índice de fase activa

// --- scoring ---
function allSignals(ph) {
  if (ph.signals) return ph.signals;
  if (ph.groups) return ph.groups.reduce((a, g) => a.concat(g.signals || []), []);
  return [];
}
function motiveQuestions() {
  const area = model.find(a => /prospecci/i.test(a.name));
  const sub = area && area.subs.find(s => /motivaci/i.test(s.name));
  return sub ? sub.visions : [];
}
function scoreMotives() {
  const s = { seguridad: 0, ego: 0, social: 0 };
  COP.forEach(ph => allSignals(ph).forEach(sig => {
    if (sig.m && gChecked[sig.id]) s[sig.m] += (sig.temp || 5);
  }));
  for (const qi in gQMotive) {
    (gQMotive[qi] || []).forEach(idx => {
      const ans = (MOTIVE_ANSWERS[qi] || [])[idx];
      if (ans && s[ans.m] !== undefined) s[ans.m] += 8;
    });
  }
  return s;
}
function scorePillars() {
  const s = { insercion: 0, autonomia: 0, accesibilidad: 0 };
  COP.forEach(ph => allSignals(ph).forEach(sig => {
    if (sig.p && gChecked[sig.id]) s[sig.p] += (sig.temp || 5);
  }));
  for (const qi in gQMotive) {
    (gQMotive[qi] || []).forEach(idx => {
      const ans = (MOTIVE_ANSWERS[qi] || [])[idx];
      if (ans && ans.p && s[ans.p] !== undefined) s[ans.p] += 8;
    });
  }
  return s;
}
function topKey(scoreObj) {
  let best = null, bestV = 0;
  for (const k in scoreObj) if (scoreObj[k] > bestV) { bestV = scoreObj[k]; best = k; }
  return best;
}
function activeMotive() { return gMotivePick || topKey(scoreMotives()); }
function activePillar() { return gPillarPick || topKey(scorePillars()); }

function leadTemp() {
  let t = 30;
  COP.forEach(ph => allSignals(ph).forEach(sig => {
    if (gChecked[sig.id]) t += (sig.temp || 0);
  }));
  let picks = 0;
  for (const qi in gQMotive) (gQMotive[qi] || []).forEach(idx => {
    const ans = (MOTIVE_ANSWERS[qi] || [])[idx];
    if (ans && ans.cold) t += ans.cold; else picks++;
  });
  t += picks * 4;
  // boosters marcados
  for (const k in BOOSTERS) BOOSTERS[k].forEach(grp => grp.opts.forEach(o => {
    if (gChecked[o.id]) t += (o.temp || 0);
  }));
  return Math.max(0, Math.min(100, t));
}
function tempLabel(t) {
  if (t >= 75) return "Caliente · listo para cerrar";
  if (t >= 55) return "Templado-alto · empuja al cierre";
  if (t >= 40) return "Templado · sigue construyendo valor";
  if (t >= 22) return "Frío · genera interés y confianza";
  return "Muy frío · cualifica o reengancha";
}

// --- next best action ---
function nextAction() {
  const ph = COP[gPhase];
  const mot = activeMotive(), pil = activePillar();
  if (ph.key === "bienvenida") return "Conecta y gánate 20 segundos de atención antes de preguntar nada.";
  if (ph.key === "cualificacion") {
    if (gChecked.c2) return "<b>No cumple requisitos.</b> Sé honesto: quizá no es su formación. No fuerces.";
    return "Confirma requisitos y pasa a destapar su <b>porqué</b>.";
  }
  if (ph.key === "motivo") {
    const answered = Object.keys(gQMotive).length;
    if (answered === 0) return "Haz la <b>primera pregunta</b> y marca hacia qué motivo apunta su respuesta.";
    if (!mot) return "Sigue preguntando: aún no hay un motivo que destaque.";
    return "Va apuntando a <b>" + motName(mot) + "</b> (" + answered + " resp.). Confírmalo antes de avanzar.";
  }
  if (ph.key === "necesidad") {
    if (!pil) return "Pregunta qué necesita de la escuela para saber qué <b>pilar</b> usar.";
    return "Busca sobre todo <b>" + pilName(pil) + "</b>. Llévalo a la propuesta de valor por ahí.";
  }
  if (ph.key === "valor") {
    if (!mot) return "Marca antes su motivo para personalizar el discurso.";
    return "Vende en clave <b>" + motName(mot) + "</b> apoyándote en <b>" + (pil ? pilName(pil) : "el pilar que más le encaje") + "</b>. Luego comprueba si asiente.";
  }
  if (ph.key === "cierre") {
    const t = leadTemp();
    if (gChecked.z1) return "<b>Dice sí.</b> Calla y formaliza ya: reserva plaza y siguiente paso.";
    if (gChecked.z2) return "Pide pensárselo: <b>acota el tiempo</b> y fija fecha concreta. Saca la duda real.";
    if (gChecked.z3) return "Pega de precio: reencuadra a <b>inversión</b> y recuerda matrícula gratuita y becas.";
    if (t >= 60) return "Está caliente: <b>propón el cierre</b> con el «por qué ahora» de su motivo.";
    return "Aún tibio: refuerza valor antes de cerrar. No aprietes todavía.";
  }
  return "";
}
function motName(k) { const m = MOTIVES.find(x => x.key === k); return m ? m.name : ""; }
function pilName(k) { const p = PILLARS.find(x => x.key === k); return p ? p.name : ""; }

/* ---------- render ---------- */
function renderGuide() {
  const root = $("guide");
  root.innerHTML = "";

  // Modo extensión: vista mínima para el panel (motivo + pilar + temperatura + fase)
  if (view === "simple") {
    const wrap = document.createElement("div"); wrap.className = "cop cop-simple";

  }

  const cop = document.createElement("div"); cop.className = "cop";
  const mainC = document.createElement("div"); mainC.className = "cop-main";
  const sideC = document.createElement("div"); sideC.className = "cop-side";

  const gw = gateWarn(); if (gw) mainC.appendChild(gw);
  mainC.appendChild(copNav());

// Barra mínima del modo extensión: motivo · pilar · temperatura, todo en una franja
function simpleBar() {
  const bar = document.createElement("div"); bar.className = "simplebar";
  const t = leadTemp();
  const mot = activeMotive(), pil = activePillar();
  const ms = scoreMotives(), ps = scorePillars();
  const anyM = ms.seguridad + ms.ego + ms.social > 0;
  const anyP = ps.insercion + ps.autonomia + ps.accesibilidad > 0;
  const motColor = (MOTIVES.find(m => m.key === mot) || {}).color || "var(--ink-faint)";
  const pilColor = (PILLARS.find(p => p.key === pil) || {}).color || "var(--ink-faint)";
  // color del termómetro según temperatura
  const tColor = t >= 75 ? "#e3493c" : t >= 55 ? "#f5a201" : t >= 40 ? "#36b37e" : "#3b82f6";
  bar.innerHTML =
    `<div class="sb-item"><span class="sb-k">Motivo</span><span class="sb-v" style="color:${anyM ? motColor : "var(--ink-faint)"}">${anyM ? esc(motName(mot)) : "—"}</span></div>` +
    `<div class="sb-item"><span class="sb-k">Busca</span><span class="sb-v" style="color:${anyP ? pilColor : "var(--ink-faint)"}">${anyP ? esc(pilName(pil)) : "—"}</span></div>` +
    `<div class="sb-temp"><span class="sb-deg" style="color:${tColor}">${t}°</span><span class="sb-bar"><span class="sb-fill" style="width:${t}%;background:${tColor}"></span></span></div>`;
  return bar;
}

// Resumen de la llamada de un vistazo: dónde estás y qué has detectado.
function copRecap() {
  const w = document.createElement("div"); w.className = "w w-recap";
  const mot = activeMotive(), pil = activePillar();
  const ms = scoreMotives(), ps = scorePillars();
  const anyM = ms.seguridad + ms.ego + ms.social > 0;
  const anyP = ps.insercion + ps.autonomia + ps.accesibilidad > 0;
  const reqKO = gChecked.c2;
  let html = `<div class="w-h">Resumen · fase ${gPhase + 1} de ${COP.length}</div>`;
  html += `<div style="font-size:14px;font-weight:800;margin-bottom:8px">${esc(COP[gPhase].name)}</div>`;
  html += `<div style="display:flex;flex-direction:column;gap:5px;font-size:13px">`;
  html += recapRow("Requisitos", reqKO ? "No cumple" : (gChecked.c1 ? "OK" : "—"), reqKO ? "#c0392b" : (gChecked.c1 ? "var(--accent-strong)" : "var(--ink-faint)"));
  html += recapRow("Motivo", anyM ? motName(mot) : "—", anyM ? "var(--ink)" : "var(--ink-faint)");
  html += recapRow("Busca", anyP ? pilName(pil) : "—", anyP ? "var(--ink)" : "var(--ink-faint)");
  html += `</div>`;
  w.innerHTML = html;
  return w;
}
function recapRow(k, v, color) {
  return `<div style="display:flex;justify-content:space-between;gap:8px"><span style="color:var(--ink-faint)">${k}</span><span style="font-weight:700;color:${color};text-align:right">${esc(v)}</span></div>`;
}

// Panel de objeciones siempre a mano: surgen en cualquier momento de la llamada.
function copObjections() {
  const w = document.createElement("div"); w.className = "w w-obj";
  const area = model.find(a => /objeci/i.test(a.name));
  if (!area) { w.innerHTML = `<div class="w-h">Objeciones</div><p class="empty-side">Sin objeciones en el editor.</p>`; return w; }
  const head = document.createElement("div");
  head.style.cssText = "display:flex;align-items:center;justify-content:space-between;cursor:pointer";
  head.innerHTML = `<div class="w-h" style="margin:0">Si pone una objeción…</div><span style="font-size:18px;color:var(--ink-faint);line-height:1">${gObjOpen ? "–" : "+"}</span>`;
  head.onclick = () => { gObjOpen = !gObjOpen; renderGuide(); };
  w.appendChild(head);
  if (!gObjOpen) {
    const hint = document.createElement("p");
    hint.style.cssText = "font-size:12.5px;color:var(--ink-faint);margin:8px 0 0";
    hint.textContent = "Toca para abrir las respuestas a las objeciones más comunes.";
    w.appendChild(hint);
    return w;
  }
  const list = document.createElement("div"); list.style.marginTop = "10px";
  area.subs.forEach(sub => {
    const open = gObjOpenItem === sub.id;
    const item = document.createElement("div");
    item.style.cssText = "border-top:1px solid var(--line-soft);padding:8px 0";
    const t = document.createElement("button");
    t.style.cssText = "display:flex;width:100%;justify-content:space-between;align-items:center;gap:8px;background:none;border:0;cursor:pointer;text-align:left;padding:0;font:inherit";
    t.innerHTML = `<span style="font-size:13.5px;font-weight:700;color:var(--ink)">${esc(sub.name)}</span><span style="font-size:15px;color:var(--ink-faint)">${open ? "–" : "+"}</span>`;
    t.onclick = () => { gObjOpenItem = open ? null : sub.id; renderGuide(); };
    item.appendChild(t);
    if (open) {
      sub.visions.forEach(v => v.extras.forEach(e => (e.examples || []).forEach(x => {
        if (!x.text.trim()) return;
        const line = document.createElement("div");
        line.style.cssText = "font-size:13px;line-height:1.45;color:var(--ink-soft);background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:0 7px 7px 0;padding:7px 10px;margin-top:7px";
        line.textContent = x.text;
        item.appendChild(line);
      })));
    }
    list.appendChild(item);
  });
  w.appendChild(list);
  return w;
}

function copIntro() {
  const d = document.createElement("div"); d.className = "cop-intro";
  d.innerHTML = `<h2>Copiloto de llamada</h2><p>Marca lo que oigas en cada fase. A la derecha tienes el resumen, el motivo y el pilar en vivo, la temperatura del lead, tu siguiente acción y, si pone una pega, las respuestas a objeciones a un clic.</p>`;
  return d;
}

function copStepper() {
  const wrap = document.createElement("div"); wrap.className = "cop-steps";
  COP.forEach((ph, i) => {
    const b = document.createElement("button");
    b.className = "cop-step" + (i === gPhase ? " on" : "") + (i < gPhase ? " done" : "");
    b.innerHTML = `<div class="cs-n">${String(i + 1).padStart(2, "0")}</div><div class="cs-t">${ph.name}</div>`;
    b.onclick = () => { gPhase = i; renderGuide(); };
    wrap.appendChild(b);
  });
  return wrap;
}

function copPhaseCard() {
  const ph = COP[gPhase];
  const card = document.createElement("div"); card.className = "cop-card";
  card.innerHTML = `<div class="cop-eyebrow"><span class="eb-num">${String(gPhase + 1).padStart(2, "0")}</span> · ${esc(ph.name)}</div><h3>${ph.title}</h3><p class="lead">${esc(ph.lead)}</p>`;

  if (ph.isPV) { card.appendChild(pvBlock()); return card; }
  if (ph.isMotivo) { card.appendChild(motivoBlock()); return card; }
  if (ph.isGroups) {
    ph.groups.forEach(g => {
      const b = document.createElement("div"); b.className = "cop-block";
      const sd = document.createElement("div"); sd.className = "say";
      sd.innerHTML = `<span class="say-k">${esc(g.q.k)}</span>${esc(g.q.t)}`;
      b.appendChild(sd);
      const h = document.createElement("div"); h.className = "cop-block-h"; h.style.margin = "12px 0 8px";
      h.textContent = g.signalsTitle || "Marca lo que detectes";
      b.appendChild(h);
      g.signals.forEach(sig => b.appendChild(signalRow(sig, true)));
      card.appendChild(b);
    });
    return card;
  }
  if (ph.isClose) {
    // pestañas: Cerrar | Objeciones
    const tabs = document.createElement("div"); tabs.className = "cl-tabs";
    [["cerrar", "Cerrar"], ["objeciones", "Gestionar objeciones"]].forEach(([key, label]) => {
      const tb = document.createElement("button");
      tb.className = "cl-tab" + (gCloseTab === key ? " on" : "");
      tb.textContent = label;
      tb.onclick = () => { gCloseTab = key; renderGuide(); };
      tabs.appendChild(tb);
    });
    card.appendChild(tabs);

    if (gCloseTab === "objeciones") {
      card.appendChild(closeObjectionsBlock());
    } else {
      card.appendChild(closeBlock());
      // señales de cómo responde al cierre
      const b = document.createElement("div"); b.className = "cop-block";
      b.innerHTML = `<div class="cop-block-h">${esc(ph.signalsTitle || "¿Cómo responde al cierre?")}</div>`;
      ph.signals.forEach(sig => b.appendChild(signalRow(sig)));
      card.appendChild(b);
      // si ha puesto una pega, aviso que lleva a la pestaña de objeciones
      if (gChecked.z2 || gChecked.z3 || gChecked.z4) {
        const tip = document.createElement("div");
        tip.style.cssText = "background:#fbe7e4;border:1px solid #e9b7ad;border-radius:10px;padding:11px 14px;margin-top:12px;font-size:13.5px;color:#b6452a;display:flex;justify-content:space-between;align-items:center;gap:10px";
        const txt = document.createElement("span"); txt.innerHTML = "<b>Ha puesto una pega.</b> Tienes la respuesta en «Gestionar objeciones».";
        const go = document.createElement("button");
        go.style.cssText = "flex-shrink:0;background:#b6452a;color:#fff;border:0;border-radius:8px;padding:7px 12px;font-weight:700;cursor:pointer;font-size:13px";
        go.textContent = "Ver respuesta →";
        go.onclick = () => { gCloseTab = "objeciones"; renderGuide(); };
        tip.appendChild(txt); tip.appendChild(go);
        card.appendChild(tip);
      }
    }
    return card;
  }

  if (ph.say) {
    const b = document.createElement("div"); b.className = "cop-block";
    b.innerHTML = `<div class="cop-block-h">Qué decir</div>`;
    ph.say.forEach(s => {
      const sd = document.createElement("div"); sd.className = "say";
      sd.innerHTML = `<span class="say-k">${esc(s.k)}</span>${esc(s.t)}`;
      b.appendChild(sd);
    });
    card.appendChild(b);
  }
  if (ph.signals) {
    const b = document.createElement("div"); b.className = "cop-block";
    b.innerHTML = `<div class="cop-block-h">${esc(ph.signalsTitle || "Marca lo que detectes")}</div>`;
    ph.signals.forEach(sig => b.appendChild(signalRow(sig)));
    card.appendChild(b);
  }
  return card;
}

function signalRow(sig, hideTag) {
  const on = !!gChecked[sig.id];
  const btn = document.createElement("button");
  btn.className = "sig" + (on ? " on" : "");
  let tag = "";
  if (!hideTag && sig.m) tag = `<span class="sig-tag tag-${sig.m}">${motName(sig.m)}</span>`;
  if (!hideTag && sig.p) tag = `<span class="sig-tag tag-${sig.p}">${pilName(sig.p)}</span>`;
  btn.innerHTML = `<span class="sig-check"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg></span><span class="sig-body"><span class="sig-t">${esc(sig.t)}</span>${tag}</span>`;
  btn.onclick = () => { gChecked[sig.id] = !gChecked[sig.id]; renderGuide(); };
  if (on && sig.r) {
    const frag = document.createElement("div");
    frag.appendChild(btn);
    const fu = document.createElement("div"); fu.className = "followup";
    fu.innerHTML = `<span class="fu-k">Engancha</span>${esc(sig.r)}`;
    frag.appendChild(fu);
    return frag;
  }
  return btn;
}

function motivoBlock() {
  const wrap = document.createElement("div");
  const qs = motiveQuestions();
  if (!qs.length) {
    const e = document.createElement("p"); e.className = "empty-side";
    e.textContent = "No encuentro las preguntas de motivación en el editor.";
    wrap.appendChild(e); return wrap;
  }
  qs.forEach((q, qi) => {
    const answers = MOTIVE_ANSWERS[qi];
    if (!answers) return; // solo las preguntas con respuestas tipificadas entran en el diagnóstico
    const b = document.createElement("div"); b.className = "cop-block";
    b.innerHTML = `<div class="cop-block-h">Pregunta ${qi + 1}</div>`;
    const sd = document.createElement("div"); sd.className = "say";
    sd.innerHTML = `<span class="say-k">Pregunta</span>${esc(q.text)}`;
    b.appendChild(sd);

    const lbl = document.createElement("div");
    lbl.style.cssText = "font-size:12px;font-weight:700;color:var(--ink-faint);margin:10px 0 8px;letter-spacing:.03em;text-transform:uppercase";
    lbl.textContent = "Marca lo que diga (puedes elegir varias)";
    b.appendChild(lbl);

    const picked = gQMotive[qi] || [];
    answers.forEach((ans, idx) => {
      const on = picked.indexOf(idx) !== -1;
      const btn = document.createElement("button");
      btn.className = "sig" + (on ? " on" : "");
      btn.innerHTML = `<span class="sig-check"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg></span><span class="sig-body"><span class="sig-t">${esc(ans.t)}</span></span>`;
      btn.onclick = () => {
        const arr = gQMotive[qi] || [];
        const at = arr.indexOf(idx);
        if (at !== -1) arr.splice(at, 1); else arr.push(idx);
        if (arr.length) gQMotive[qi] = arr; else delete gQMotive[qi];
        renderGuide();
      };
      b.appendChild(btn);
      if (on && ans.r) {
        const fu = document.createElement("div"); fu.className = "followup";
        fu.innerHTML = `<span class="fu-k">Engancha</span>${esc(ans.r)}`;
        b.appendChild(fu);
      }
    });
    wrap.appendChild(b);
  });
  return wrap;
}

function pvBlock() {
  const wrap = document.createElement("div");
  const mot = activeMotive(), pil = activePillar();
  if (!mot) {
    const e = document.createElement("p"); e.className = "empty-side";
    e.textContent = "Marca primero el motivo en la fase «Motivo ulterior» para ver aquí las frases personalizadas.";
    wrap.appendChild(e); return wrap;
  }
  const area = model.find(a => /valor/i.test(a.name));
  const sub = area && area.subs.find(s => s.name.toLowerCase() === mot);
  if (!sub) { const e = document.createElement("p"); e.className = "empty-side"; e.textContent = "No encuentro la propuesta de valor de este motivo en el editor."; wrap.appendChild(e); return wrap; }

  const head = document.createElement("div"); head.className = "cop-block";
  head.innerHTML = `<div class="cop-block-h">Cruce detectado · vende por aquí</div><div>` +
    `<span class="pill-lead tag-${mot}">${motName(mot)}</span>` +
    (pil ? `<span class="pill-lead tag-${pil}">${pilName(pil)}</span>` : "") + `</div>`;
  wrap.appendChild(head);

  // ordenar visiones: el pilar detectado primero
  const visions = sub.visions.slice().sort((a, b) => {
    const pa = pilarOfVision(a) === pil ? 0 : 1, pb = pilarOfVision(b) === pil ? 0 : 1;
    return pa - pb;
  });
  visions.forEach(v => {
    const isTop = pilarOfVision(v) === pil;
    const b = document.createElement("div"); b.className = "cop-block";
    b.innerHTML = `<div class="cop-block-h">${esc(v.text)}${isTop ? " · ★ lo que busca" : ""}</div>`;
    // cada propuesta = un punto fuerte de Explora, con sus frases debajo
    v.extras.forEach(e => {
      if (!e.text.trim() && !(e.examples || []).length) return;
      const sp = document.createElement("div"); sp.className = "strongpoint";
      let html = `<div class="sp-name"><span class="sp-dot">◆</span>${esc(e.text)}</div>`;
      (e.examples || []).forEach(x => {
        if (!x.text.trim()) return;
        html += `<div class="sp-line">${esc(x.text)}</div>`;
      });
      sp.innerHTML = html;
      b.appendChild(sp);
    });
    wrap.appendChild(b);
  });
  return wrap;
}

function pilarOfVision(v) {
  const t = (v.text || "").toLowerCase();
  if (/inserci|laboral|empleo/.test(t)) return "insercion";
  if (/autonom|flexib/.test(t)) return "autonomia";
  if (/accesib|precio/.test(t)) return "accesibilidad";
  return null;
}

function objByKeyword(re) {
  const area = model.find(a => /objeci/i.test(a.name));
  if (!area) return null;
  return area.subs.find(s => re.test(s.name.toLowerCase())) || null;
}

function closeObjectionsBlock() {
  const wrap = document.createElement("div");
  const area = model.find(a => /objeci/i.test(a.name));
  if (!area) { const e = document.createElement("p"); e.className = "empty-side"; e.textContent = "No hay objeciones en el editor."; wrap.appendChild(e); return wrap; }

  // 1) Reacción directa a la pega marcada en el cierre
  const objMap = [
    { sig: "z3", re: /precio|dinero/, label: "Pone el precio como pega" },
    { sig: "z2", re: /pensar/, label: "Pide pensárselo" },
    { sig: "z4", re: /tercero|consult|pareja|hablar/, label: "Lo tiene que hablar con alguien" }
  ];
  let shownAny = false;
  objMap.forEach(o => {
    if (!gChecked[o.sig]) return;
    const sub = area.subs.find(s => o.re.test(s.name.toLowerCase()));
    if (!sub) return;
    shownAny = true;
    const box = document.createElement("div"); box.className = "cop-block";
    box.innerHTML = `<div class="cop-block-h" style="color:#b6452a">⚠ ${esc(o.label)} · responde así</div>`;
    sub.visions.forEach(v => v.extras.forEach(e => {
      if (!e.text.trim() && !(e.examples || []).length) return;
      const sp = document.createElement("div"); sp.className = "strongpoint";
      sp.style.background = "var(--accent-soft)"; sp.style.borderColor = "var(--accent)";
      let html = `<div class="sp-name"><span class="sp-dot">★</span>${esc(e.text)}</div>`;
      (e.examples || []).forEach(x => { if (x.text.trim()) html += `<div class="sp-line">${esc(x.text)}</div>`; });
      sp.innerHTML = html; box.appendChild(sp);
    }));
    wrap.appendChild(box);
  });

  // 2) Lista completa de objeciones, plegable, por si pone otra
  const h = document.createElement("div"); h.className = "cop-block-h";
  h.style.marginTop = shownAny ? "4px" : "0";
  h.textContent = shownAny ? "Otras objeciones" : "Elige la objeción que ha puesto";
  wrap.appendChild(h);

  area.subs.forEach(sub => {
    const open = gObjOpenItem === sub.id;
    const item = document.createElement("div"); item.className = "cop-block"; item.style.marginBottom = "8px";
    const t = document.createElement("button");
    t.className = "sig" + (open ? " on" : ""); t.style.marginBottom = "0";
    t.innerHTML = `<span class="sig-body"><span class="sig-t">${esc(sub.name)}</span></span><span style="font-size:18px;color:var(--ink-faint);margin-left:auto">${open ? "–" : "+"}</span>`;
    t.onclick = () => { gObjOpenItem = open ? null : sub.id; renderGuide(); };
    item.appendChild(t);
    if (open) {
      sub.visions.forEach(v => v.extras.forEach(e => {
        if (!e.text.trim() && !(e.examples || []).length) return;
        const sp = document.createElement("div"); sp.className = "strongpoint"; sp.style.marginTop = "8px";
        let html = `<div class="sp-name"><span class="sp-dot">◆</span>${esc(e.text)}</div>`;
        (e.examples || []).forEach(x => { if (x.text.trim()) html += `<div class="sp-line">${esc(x.text)}</div>`; });
        sp.innerHTML = html; item.appendChild(sp);
      }));
    }
    wrap.appendChild(item);
  });
  return wrap;
}

function closeBlock() {
  const wrap = document.createElement("div");
  const ms = scoreMotives();
  const ranked = Object.keys(ms).sort((a, b) => ms[b] - ms[a]).filter(k => ms[k] > 0);
  const pil = activePillar();
  const order = ranked.length ? ranked.slice(0, 2) : [activeMotive() || "seguridad"];
  const area = model.find(a => /cierre/i.test(a.name));
  if (!area) return wrap;

  const pilWord = { insercion: "inserci", autonomia: "autonom", accesibilidad: "accesib" }[pil] || "";

  order.forEach((motKey, i) => {
    const sub = area.subs.find(s => s.name.toLowerCase() === motKey);
    if (!sub) return;
    const b = document.createElement("div"); b.className = "cop-block";
    const tagTxt = i === 0 ? "★ Mejor cierre" : "Alternativa";
    b.innerHTML = `<div class="cop-block-h"><span class="pill-lead tag-${motKey}" style="margin:0 6px 0 0">${motName(motKey)}</span>${tagTxt}</div>`;
    sub.visions.forEach(v => {
      if (v.text.trim()) {
        const sd = document.createElement("div"); sd.className = "say";
        sd.innerHTML = `<span class="say-k">Por qué ahora</span>${esc(v.text)}`;
        b.appendChild(sd);
      }
      // ordenar extras: el del pilar detectado primero
      const extras = v.extras.slice().sort((x, y) => {
        const xm = pilWord && x.text.toLowerCase().includes(pilWord) ? 0 : 1;
        const ym = pilWord && y.text.toLowerCase().includes(pilWord) ? 0 : 1;
        return xm - ym;
      });
      extras.forEach(e => {
        if (!e.text.trim() && !(e.examples || []).length) return;
        const isPil = pilWord && e.text.toLowerCase().includes(pilWord);
        const sp = document.createElement("div"); sp.className = "strongpoint";
        if (isPil) { sp.style.background = "var(--accent-soft)"; sp.style.borderColor = "var(--accent)"; }
        let html = `<div class="sp-name"><span class="sp-dot">${isPil ? "★" : "◆"}</span>${esc(e.text)}${isPil ? " · lo que busca" : ""}</div>`;
        (e.examples || []).forEach(x => {
          if (!x.text.trim()) return;
          html += `<div class="sp-line">${esc(x.text)}</div>`;
        });
        sp.innerHTML = html;
        b.appendChild(sp);
      });
    });
    wrap.appendChild(b);
  });
  return wrap;
}

function gateFor(phaseIndex) {
  // umbral mínimo de temperatura para ENTRAR en una fase
  const key = COP[phaseIndex] && COP[phaseIndex].key;
  if (key === "valor") return 60;
  if (key === "cierre") return 75;
  return 0;
}

function copNav() {
  const nav = document.createElement("div"); nav.className = "cop-nav";
  const back = document.createElement("button"); back.className = "cop-btn"; back.textContent = "← Atrás";
  back.disabled = gPhase === 0;
  back.onclick = () => { if (gPhase > 0) { gPhase--; gForce = false; renderGuide(); } };
  nav.appendChild(back);
  if (gPhase < COP.length - 1) {
    const target = gPhase + 1;
    const need = gateFor(target);
    const temp = leadTemp();
    const blocked = need > 0 && temp < need && !gForce;
    const next = document.createElement("button");
    next.className = "cop-btn primary"; next.textContent = "Siguiente →";
    if (blocked) {
      next.textContent = "Aún frío para " + COP[target].name.toLowerCase();
      next.onclick = () => { gForce = true; renderGuide(); }; // primer clic: avisa; deja pasar al segundo
    } else {
      next.onclick = () => { gPhase++; gForce = false; renderGuide(); };
    }
    nav.appendChild(next);
  } else {
    const reset = document.createElement("button"); reset.className = "cop-btn primary"; reset.textContent = "Nueva llamada";
    reset.onclick = () => { copReset(); renderGuide(); };
    nav.appendChild(reset);
  }
  return nav;
}

function gateWarn() {
  const target = gPhase + 1;
  const need = gateFor(target);
  if (!(need > 0)) return null;
  const temp = leadTemp();
  const key = COP[target].key;
  const boosters = BOOSTERS[key] || [];
  const reached = temp >= need;
  if (reached) return null;
  const box = document.createElement("div");
  box.style.cssText = "background:#fbe7e4;border:1px solid #e9b7ad;border-radius:11px;padding:14px 16px;margin-top:14px";
  box.innerHTML = `<div style="font-weight:800;color:#b6452a;font-size:14px;margin-bottom:3px">Lead aún frío (${temp}° · mínimo ${need}° para ${esc(COP[target].name)})</div>` +
    `<div style="font-size:13.5px;color:var(--ink-soft);margin-bottom:11px">Haz estas preguntas y marca lo que conteste: la temperatura sube sola y te avisa cuando ya puedas pasar.</div>`;

  boosters.forEach(grp => {
    const g = document.createElement("div"); g.style.marginBottom = "12px";
    const q = document.createElement("div"); q.className = "say"; q.style.marginBottom = "7px";
    q.innerHTML = `<span class="say-k">Pregunta extra</span>${esc(grp.q)}`;
    g.appendChild(q);
    grp.opts.forEach(o => {
      const on = !!gChecked[o.id];
      const btn = document.createElement("button");
      btn.className = "sig" + (on ? " on" : "");
      btn.style.marginBottom = "6px";
      btn.innerHTML = `<span class="sig-check"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg></span><span class="sig-body"><span class="sig-t">${esc(o.t)}</span></span>`;
      btn.onclick = () => { gChecked[o.id] = !gChecked[o.id]; renderGuide(); };
      g.appendChild(btn);
    });
    box.appendChild(g);
  });
  const note = document.createElement("div");
  note.style.cssText = "font-size:12.5px;color:var(--ink-faint)";
  note.textContent = "Si lo ves claro, puedes pasar igual con «Siguiente».";
  box.appendChild(note);
  return box;
}

/* ---------- side widgets ---------- */
function copThermo() {
  const t = leadTemp();
  const w = document.createElement("div"); w.className = "w w-thermo";
  w.innerHTML = `<div class="w-h">Temperatura del lead</div>
    <div class="thermo-deg">${t}<sup>°</sup></div>
    <div class="thermo-lbl">${esc(tempLabel(t))}</div>
    <div class="thermo-track"><div class="thermo-knob" style="left:${t}%"></div></div>
    <div class="thermo-scale"><span>Frío</span><span>Templado</span><span>Caliente</span></div>`;
  return w;
}

function copDetect() {
  const w = document.createElement("div"); w.className = "w w-detect";
  const ms = scoreMotives(), ps = scorePillars();
  const mot = activeMotive(), pil = activePillar();
  const mTotal = Math.max(1, ms.seguridad + ms.ego + ms.social);
  const pTotal = Math.max(1, ps.insercion + ps.autonomia + ps.accesibilidad);
  let html = `<div class="w-h">En vivo · qué mueve al lead</div>`;
  html += `<div style="font-size:11px;font-weight:700;color:var(--ink-faint);margin-bottom:6px">MOTIVO ULTERIOR</div>`;
  html += `<div class="meters-grid">`;
  MOTIVES.forEach(m => {
    const pct = Math.round(ms[m.key] / mTotal * 100);
    html += meterRow(m.name, pct, m.color, m.key === mot && ms[m.key] > 0);
  });
  html += `</div>`;
  html += `<div style="font-size:11px;font-weight:700;color:var(--ink-faint);margin:11px 0 6px">PILAR DE FP QUE BUSCA</div>`;
  html += `<div class="meters-grid">`;
  PILLARS.forEach(p => {
    const pct = Math.round(ps[p.key] / pTotal * 100);
    html += meterRow(p.name, pct, p.color, p.key === pil && ps[p.key] > 0);
  });
  html += `</div>`;
  const anyM = ms.seguridad + ms.ego + ms.social > 0;
  const anyP = ps.insercion + ps.autonomia + ps.accesibilidad > 0;
  html += `<div class="lead-result">`;
  html += anyM ? `Vende en clave <b>${motName(mot)}</b>` : `Aún sin motivo claro`;
  html += anyP ? ` · enfoca <b>${pilName(pil)}</b>.` : `.`;
  html += `</div>`;
  w.innerHTML = html;
  return w;
}
function meterRow(name, pct, color, star) {
  return `<div class="meter"><div class="meter-top"><span class="meter-name">${name}${star ? " ★" : ""}</span><span class="meter-pct">${pct}%</span></div>` +
    `<div class="meter-track"><div class="meter-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}

function copNBA() {
  const w = document.createElement("div"); w.className = "w nba w-nba";
  w.innerHTML = `<div class="w-h">Siguiente mejor acción</div><div class="nba-text">${nextAction()}</div>`;
  return w;
}

function esc(s) { return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

const EDIT_PASSWORD = "12345678";
let editUnlocked = false;
let view = "guide";

function setView(v) {
  view = v;
  const isEd = v === "editor";
  const isGuideLike = v === "guide" || v === "simple";
  $("editor").style.display = isEd ? "" : "none";
  $("guide").style.display = isGuideLike ? "" : "none";
  $("areaStrip").style.display = isEd ? "" : "none";
  $("pager").style.display = isEd ? "" : "none";
  $("crumb").style.display = isEd ? "" : "none";
  $("tabEditor").classList.toggle("active", isEd);
  $("tabGuide").classList.toggle("active", v === "guide");
  $("tabSimple").classList.toggle("active", v === "simple");
  if (isGuideLike) renderGuide();
}

function requestEditor() {
  if (editUnlocked) { setView("editor"); return; }
  openPassModal();
}

function openPassModal() {
  const ov = $("passModal");
  ov.classList.add("show");
  const inp = $("passInput");
  inp.value = ""; $("passErr").style.display = "none";
  setTimeout(() => inp.focus(), 30);
}
function closePassModal() { $("passModal").classList.remove("show"); }
function submitPass() {
  const val = $("passInput").value;
  if (val === EDIT_PASSWORD) {
    editUnlocked = true;
    $("tabEditor").classList.remove("locked");
    closePassModal();
    setView("editor");
  } else {
    $("passErr").style.display = "block";
    $("passInput").value = "";
    $("passInput").focus();
  }
}

$("tabEditor").onclick = requestEditor;
$("tabGuide").onclick = () => setView("guide");
$("tabSimple").onclick = () => setView("simple");
$("passSubmit").onclick = submitPass;
$("passCancel").onclick = closePassModal;
$("passInput").addEventListener("keydown", e => { if (e.key === "Enter") submitPass(); if (e.key === "Escape") closePassModal(); });
$("passModal").addEventListener("click", e => { if (e.target === $("passModal")) closePassModal(); });

// arranca en modo guiado (consulta) y con el editor bloqueado
$("tabEditor").classList.add("locked");

renderNav(); renderEditor(); updateProgress();
setView("guide");
</script>
</body>
</html>
